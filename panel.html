<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZULA Altın | Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(255,204,0,.12), transparent 25%),
        radial-gradient(circle at bottom right, rgba(255,140,0,.12), transparent 22%),
        linear-gradient(135deg,#0d1016,#141923,#0a0c11);
      color:#fff;
      padding:28px;
    }
    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      margin-bottom:28px;
      flex-wrap:wrap;
    }
    .brand{
      display:inline-block;
      width:fit-content;
      padding:10px 16px;
      border-radius:999px;
      background:linear-gradient(135deg,#ffcc00,#ff9500);
      color:#111;
      font-weight:800;
      margin-bottom:14px;
    }
    h1{font-size:38px}
    .logout-btn{
      height:48px;
      padding:0 18px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      font-weight:800;
      background:#ff4d4f;
      color:#fff;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(280px,1fr));
      gap:20px;
    }
    .card{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:24px;
      box-shadow:0 20px 50px rgba(0,0,0,.2);
    }
    .card h2{
      font-size:24px;
      margin-bottom:16px;
    }
    .row{
      display:flex;
      justify-content:space-between;
      gap:16px;
      padding:14px 0;
      border-bottom:1px solid rgba(255,255,255,.07);
      flex-wrap:wrap;
    }
    .row:last-child{border-bottom:none}
    .row span{color:rgba(255,255,255,.65)}
    .row strong{
      color:#fff;
      max-width:65%;
      text-align:right;
      word-break:break-word;
    }
    .muted{
      color:rgba(255,255,255,.72);
      line-height:1.7;
    }
    @media(max-width:900px){
      .grid{grid-template-columns:1fr}
      h1{font-size:30px}
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="brand">Z Altın</div>
      <h1>Kullanıcı Paneli</h1>
    </div>
    <button id="logoutBtn" class="logout-btn">Çıkış Yap</button>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Hesap Bilgileri</h2>
      <div class="row">
        <span>Ad Soyad</span>
        <strong id="userName">Yükleniyor...</strong>
      </div>
      <div class="row">
        <span>E-posta</span>
        <strong id="userEmail">Yükleniyor...</strong>
      </div>
      <div class="row">
        <span>Kullanıcı ID</span>
        <strong id="userId">Yükleniyor...</strong>
      </div>
    </div>

    <div class="card">
      <h2>Durum</h2>
      <p class="muted">
        Giriş başarılı. Bu sayfa sadece oturum açmış kullanıcılar için gösterilir.
        Buraya daha sonra profil, duyuru, üyelik bilgileri veya kullanıcı içerikleri ekleyebilirsin.
      </p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "BURAYA_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "BURAYA_SUPABASE_ANON_KEY";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const userName = document.getElementById("userName");
    const userEmail = document.getElementById("userEmail");
    const userId = document.getElementById("userId");
    const logoutBtn = document.getElementById("logoutBtn");

    async function loadUser() {
      const { data, error } = await supabaseClient.auth.getUser();

      if (error || !data.user) {
        window.location.href = "index.html";
        return;
      }

      const user = data.user;
      userName.textContent = user.user_metadata?.full_name || "Belirtilmemiş";
      userEmail.textContent = user.email || "-";
      userId.textContent = user.id || "-";
    }

    logoutBtn.addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    });

    loadUser();
  </script>
</body>
</html>
